services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: instagram_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - instagram-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - instagram-network

  backend:
    build:
      context: ./instagram-be
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/instagram_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      REDIS_HOST: redis
      # Add other necessary env vars like CLOUDINARY_URL, JWT_SECRET, etc.
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - instagram-network

  frontend:
    build:
      context: ./instagram-fe
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - instagram-network

networks:
  instagram-network:
    driver: bridge
